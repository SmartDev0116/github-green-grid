name: Daily Contribution

on:
  schedule:
    # Roz subah 1:00 AM UTC = 6:00 AM Pakistan (PKT)
    - cron: '0 1 * * *'
  workflow_dispatch: # Manual run button ke liye

permissions:
  contents: write

jobs:
  contribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Add today's contribution
        run: |
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC') - daily activity" >> contributions/log.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contributions/log.txt
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: daily contribution $(date -u '+%Y-%m-%d')"
          git push
